<script type="text/babel">

const { useState, useRef, useEffect } = React;

// ── Brand tokens ──────────────────────────────────────────────────────
const B = {
  navy:    '#1B3A6B',
  navyD:   '#0F2245',
  mid:     '#162038',
  lime:    '#78BE20',
  limeD:   '#5a9018',
  white:   '#FFFFFF',
  offW:    '#F0F4FA',
  gray:    '#8493A8',
  black:   '#090E1A',
};

// Role accent colors
const ROLES = {
  diretor:   { pt: 'Diretor Aeromédico',   en: 'Aeromedical Director',   color: '#D4A820', colorD: '#9a7a18', badge: 'DIR' },
  medico:    { pt: 'Médico Aeromédico',     en: 'Aeromedical Physician',  color: '#78BE20', colorD: '#5a9018', badge: 'MED' },
  enfermeiro:{ pt: 'Enfermeiro Aeromédico', en: 'Aeromedical Nurse',      color: '#29B6C8', colorD: '#1a7f8c', badge: 'ENF' },
  regulador: { pt: 'Regulador de Missão',   en: 'Mission Regulator',      color: '#E07820', colorD: '#a05510', badge: 'REG' },
};

// ECG svg
const ECG = ({ color = B.lime, w = 140, h = 28 }) => (
  <svg width={w} height={h} viewBox={`0 0 140 28`} fill="none">
    <polyline points="0,14 22,14 30,5 38,23 46,3 54,25 62,14 90,14 100,14 120,14 140,14"
      stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

// Logo (inlined as text — will be replaced with real logo if available)
const LogoMark = ({ size = 32, color = B.lime }) => (
  <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
    <path d="M4 22l9-13 3.5 5L27 7l-4 14 7 3-2 5-9-2-3.5 7-5-2 2-7L4 22z" fill={color}/>
    <path d="M20 30v-3" stroke={color} strokeWidth="2" strokeLinecap="round"/>
  </svg>
);

const LogoFull = ({ width = 120, invert = true }) => (
  <img src={window.LOGO_B64} width={width} style={{ filter: invert ? 'brightness(0) invert(1)' : 'none', display: 'block' }} alt="AltusMed"/>
);

// QR placeholder
const QRBlock = ({ size = 44, bg = 'rgba(255,255,255,0.08)', fg = 'rgba(255,255,255,0.3)' }) => (
  <div style={{ width: size, height: size, background: bg, borderRadius: 4, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2, flexShrink: 0 }}>
    <svg width={size * 0.7} height={size * 0.7} viewBox="0 0 24 24" fill={fg}>
      <rect x="1" y="1" width="9" height="9" rx="1"/><rect x="3" y="3" width="5" height="5" rx="0.5" fill={bg}/>
      <rect x="14" y="1" width="9" height="9" rx="1"/><rect x="16" y="3" width="5" height="5" rx="0.5" fill={bg}/>
      <rect x="1" y="14" width="9" height="9" rx="1"/><rect x="3" y="16" width="5" height="5" rx="0.5" fill={bg}/>
      <rect x="14" y="14" width="4" height="4" rx="0.5"/><rect x="20" y="14" width="3" height="3" rx="0.5"/>
      <rect x="14" y="20" width="3" height="3" rx="0.5"/><rect x="19" y="19" width="4" height="4" rx="0.5"/>
    </svg>
  </div>
);

// Photo placeholder
const Photo = ({ size = 64, color = B.lime }) => (
  <div style={{ width: size, height: size, borderRadius: 8, border: `2px solid ${color}30`, background: 'rgba(255,255,255,0.06)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', flexShrink: 0, overflow: 'hidden' }}>
    <svg width={size * 0.4} height={size * 0.4} viewBox="0 0 24 24" fill="rgba(255,255,255,0.2)">
      <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" fill="rgba(255,255,255,0.2)"/>
    </svg>
    <div style={{ fontSize: 7, color: 'rgba(255,255,255,0.2)', fontFamily: 'monospace', marginTop: 2 }}>foto</div>
  </div>
);

// ── ID Card component ─────────────────────────────────────────────────
// CR = credit-card ratio 85.6mm × 54mm ≈ 1.585
const CARD_W = 340;
const CARD_H = 214;

function IDCardFront({ role, name, crm, blood, id }) {
  const r = ROLES[role];
  return (
    <div style={{
      width: CARD_W, height: CARD_H, borderRadius: 14, overflow: 'hidden',
      background: `linear-gradient(145deg, ${B.navyD} 0%, ${B.mid} 55%, ${B.navy} 100%)`,
      border: `1.5px solid ${r.color}40`,
      boxShadow: `0 16px 48px rgba(0,0,0,0.6), 0 0 0 1px ${r.color}20, inset 0 1px 0 rgba(255,255,255,0.06)`,
      position: 'relative', fontFamily: "'Space Grotesk', sans-serif",
      display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
    }}>
      {/* Top color bar */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 4, background: r.color, boxShadow: `0 0 12px ${r.color}80` }}/>

      {/* Grid texture */}
      <div style={{ position: 'absolute', inset: 0, opacity: 0.03, backgroundImage: `repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(255,255,255,1) 20px), repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(255,255,255,1) 20px)` }}/>

      {/* Decorative ECG bg */}
      <div style={{ position: 'absolute', bottom: 30, left: -10, opacity: 0.06 }}>
        <ECG color="white" w={380} h={60}/>
      </div>

      {/* Glow orb */}
      <div style={{ position: 'absolute', top: -30, right: -30, width: 120, height: 120, borderRadius: '50%', background: r.color, opacity: 0.06, filter: 'blur(30px)' }}/>

      {/* Header row */}
      <div style={{ padding: '16px 18px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', position: 'relative' }}>
        <LogoFull width={88}/>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 8, color: r.color, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase' }}>AEROMÉDICO</div>
          <div style={{ fontSize: 8, color: r.color, letterSpacing: '0.1em', opacity: 0.7 }}>AEROMEDIC</div>
          <div style={{ marginTop: 5, background: r.color, color: B.black, fontSize: 9, fontWeight: 800, letterSpacing: '0.1em', padding: '2px 8px', borderRadius: 3 }}>{r.badge}</div>
        </div>
      </div>

      {/* Main content */}
      <div style={{ padding: '0 18px 16px', display: 'flex', gap: 14, alignItems: 'flex-end', position: 'relative' }}>
        <Photo size={64} color={r.color}/>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: 'white', lineHeight: 1.2, marginBottom: 4, textWrap: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{name}</div>
          <div style={{ fontSize: 10, color: r.color, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>{r.pt}</div>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
            {crm && <div style={{ fontSize: 9, color: 'rgba(255,255,255,0.45)', background: 'rgba(255,255,255,0.06)', padding: '2px 8px', borderRadius: 3, fontFamily: 'monospace' }}>{crm}</div>}
            {blood && <div style={{ fontSize: 9, color: r.color, background: `${r.color}18`, padding: '2px 8px', borderRadius: 3, fontWeight: 700 }}>⬤ {blood}</div>}
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
          <QRBlock size={44} bg={`${r.color}12`} fg={`${r.color}70`}/>
          <div style={{ fontSize: 7, color: 'rgba(255,255,255,0.25)', fontFamily: 'monospace', textAlign: 'right' }}>ID {id}</div>
        </div>
      </div>

      {/* Bottom strip */}
      <div style={{ background: 'rgba(0,0,0,0.25)', padding: '7px 18px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderTop: `1px solid rgba(255,255,255,0.06)`, position: 'relative' }}>
        <ECG color={r.color} w={90} h={18}/>
        <div style={{ fontSize: 7, color: 'rgba(255,255,255,0.3)', letterSpacing: '0.06em', textAlign: 'right', lineHeight: 1.6 }}>
          LIVRE TRÂNSITO AEROMÉDICO<br/>
          <span style={{ opacity: 0.6 }}>FREE AEROMEDICAL TRANSIT</span>
        </div>
      </div>
    </div>
  );
}

  return (
    <div style={{
      width: CARD_W, height: CARD_H, borderRadius: 14, overflow: 'hidden',
      background: r.color,
      boxShadow: `0 16px 48px rgba(0,0,0,0.5)`,

      display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
    }}>

      <div style={{ position: 'absolute', inset: 0, opacity: 0.1, backgroundImage: `repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(0,0,0,1) 9px)` }}/>

      {/* Glow */}
      <div style={{ position: 'absolute', bottom: -20, right: -20, width: 100, height: 100, borderRadius: '50%', background: 'white', opacity: 0.12, filter: 'blur(20px)' }}/>

      {/* Top */}

        <div>
          <div style={{ fontSize: 12, fontWeight: 800, color: B.black, letterSpacing: '0.08em', textTransform: 'uppercase' }}>ALTUSMED</div>

        </div>
        <LogoMark size={28} color={B.black}/>
      </div>

      {/* Contact */}
      <div style={{ padding: '0 18px', position: 'relative' }}>
        <div style={{ background: `${B.black}18`, borderRadius: 8, padding: '10px 14px' }}>
          {phone && <div style={{ fontSize: 10, color: B.black, fontWeight: 500, marginBottom: 4 }}>📞 {phone}</div>}
          {email && <div style={{ fontSize: 10, color: B.black, fontWeight: 500, marginBottom: 4 }}>✉ {email}</div>}
          <div style={{ fontSize: 10, color: B.black, fontWeight: 500 }}>🌐 altusmed.com.br</div>
        </div>
      </div>

      {/* Bottom */}

// ── Canvas ────────────────────────────────────────────────────────────
function Canvas({ children }) {
  const [pan, setPan] = useState({ x: 60, y: 80 });
  const [zoom, setZoom] = useState(0.7);
  const dragging = useRef(false);
  const last = useRef({ x: 0, y: 0 });

  const onWheel = (e) => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      setZoom(z => Math.max(0.2, Math.min(2, z - e.deltaY * 0.005)));
    } else {
      setPan(p => ({ x: p.x - e.deltaX, y: p.y - e.deltaY }));
    }
  };
  const onMouseDown = (e) => { dragging.current = true; last.current = { x: e.clientX, y: e.clientY }; };
  const onMouseMove = (e) => {
    if (!dragging.current) return;
    setPan(p => ({ x: p.x + e.clientX - last.current.x, y: p.y + e.clientY - last.current.y }));
    last.current = { x: e.clientX, y: e.clientY };
  };
  const onMouseUp = () => { dragging.current = false; };

  return (
    <div onWheel={onWheel} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
      style={{ width: '100vw', height: '100vh', overflow: 'hidden', background: B.black, cursor: 'grab', position: 'relative', userSelect: 'none' }}>
      {/* Dot grid */}
      <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
        <defs><pattern id="dg" width="28" height="28" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(255,255,255,0.05)"/>
        </pattern></defs>
        <rect width="100%" height="100%" fill="url(#dg)"/>
      </svg>

      {/* Toolbar */}
      <div style={{ position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)', zIndex: 200,
        background: 'rgba(15,22,40,0.95)', backdropFilter: 'blur(12px)',
        border: '1px solid rgba(255,255,255,0.08)', borderRadius: 10,
        padding: '8px 20px', display: 'flex', alignItems: 'center', gap: 20 }}>
        <img src={window.LOGO_B64} alt="AltusMed" style={{ height: 18, filter: 'brightness(0) invert(1)', opacity: 0.8 }}/>
        <div style={{ width: 1, height: 16, background: 'rgba(255,255,255,0.12)' }}/>
        <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', fontFamily: "'DM Sans', sans-serif" }}>Identidade Visual — Crachás & Patches</span>
        <div style={{ width: 1, height: 16, background: 'rgba(255,255,255,0.12)' }}/>
        <div style={{ display: 'flex', gap: 5 }}>
          {[0.5, 0.7, 1].map(z => (
            <button key={z} onClick={(e) => { e.stopPropagation(); setZoom(z); }} style={{
              background: Math.abs(zoom - z) < 0.02 ? 'rgba(120,190,32,0.2)' : 'transparent',
              border: `1px solid ${Math.abs(zoom - z) < 0.02 ? B.lime : 'rgba(255,255,255,0.08)'}`,
              borderRadius: 5, color: Math.abs(zoom - z) < 0.02 ? B.lime : 'rgba(255,255,255,0.4)',
              fontSize: 11, padding: '3px 9px', cursor: 'pointer', fontFamily: "'DM Sans', sans-serif",
            }}>{Math.round(z * 100)}%</button>
          ))}
        </div>
      </div>

      {/* Canvas content */}
      <div style={{ position: 'absolute', transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: '0 0' }}>
        {children}
      </div>
    </div>
  );
}
