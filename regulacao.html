<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AltusMed · Nova Regulação</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0f1e35;
    --navy2:   #162844;
    --navy3:   #1e3a5f;
    --green:   #78be20;
    --green2:  #5a9a10;
    --amber:   #f59e0b;
    --red:     #ef4444;
    --text:    #e2e8f0;
    --text-m:  #94a3b8;
    --text-l:  #64748b;
    --border:  rgba(255,255,255,0.08);
    --card:    rgba(255,255,255,0.04);
    --ff:      'DM Sans', sans-serif;
    --radius:  10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--ff); background: var(--navy); color: var(--text); min-height: 100vh; }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--navy2); border-bottom: 1px solid var(--border);
    padding: 0 2rem; height: 56px;
    display: flex; align-items: center; gap: 1rem;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: .95rem; }
  .topbar-brand-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: #0f1e35; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .topbar-title {
    font-size: .92rem; font-weight: 600; color: var(--text-m);
    padding-left: 1rem; border-left: 1px solid var(--border);
  }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
  .topbar-user { font-size: .85rem; color: var(--text-m); }
  .topbar-user strong { color: var(--text); }

  .btn-sm {
    background: rgba(255,255,255,.06); border: 1px solid var(--border);
    border-radius: 7px; padding: .35rem .9rem;
    font-family: var(--ff); font-size: .8rem; font-weight: 600;
    color: var(--text-m); cursor: pointer; transition: all .2s;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .btn-sm:hover { background: rgba(255,255,255,.1); color: var(--text); }

  /* ── MAIN ── */
  .main { max-width: 800px; margin: 0 auto; padding: 2rem; }

  /* ── SEÇÃO COLAPSÁVEL ── */
  .section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden;
  }
  .section-header {
    padding: 1rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none; transition: background .2s;
  }
  .section-header:hover { background: rgba(255,255,255,.03); }
  .section-title { font-size: .95rem; font-weight: 600; display: flex; align-items: center; gap: .5rem; }
  .section-toggle { font-size: .7rem; color: var(--text-l); transition: transform .2s; }
  .section-toggle.open { transform: rotate(180deg); }
  .section-body { padding: 1.25rem; border-top: 1px solid var(--border); }
  .section-body.hidden { display: none; }

  /* ── CAMPOS ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
  .form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.full { grid-template-columns: 1fr; }
  @media (max-width: 600px) {
    .form-grid, .form-grid.cols3 { grid-template-columns: 1fr; }
  }
  .field { display: flex; flex-direction: column; gap: .35rem; }
  .field.full { grid-column: 1 / -1; }
  .field label {
    font-size: .75rem; font-weight: 600; color: var(--text-m);
    text-transform: uppercase; letter-spacing: .05em;
  }
  .field input, .field select, .field textarea {
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 8px; padding: .6rem .9rem;
    color: var(--text); font-family: var(--ff); font-size: .9rem;
    outline: none; transition: border-color .2s;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--green);
  }
  .field select option { background: var(--navy2); }
  .field textarea { resize: vertical; }

  /* ── PA lado a lado ── */
  .pa-group { display: flex; align-items: center; gap: .5rem; }
  .pa-group input { flex: 1; }
  .pa-sep { color: var(--text-l); font-size: 1.2rem; font-weight: 300; }

  /* ── GCS ── */
  .gcs-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .85rem; }
  .gcs-total {
    margin-top: .75rem; padding: .75rem 1rem;
    background: rgba(120,190,32,.1); border: 1px solid rgba(120,190,32,.25);
    border-radius: 8px; display: flex; align-items: center; justify-content: space-between;
  }
  .gcs-total-label { font-size: .85rem; color: var(--text-m); font-weight: 500; }
  .gcs-total-value { font-size: 1.6rem; font-weight: 700; color: var(--green); }

  /* ── O2 Duração ── */
  .o2-duracao {
    margin-top: .75rem; padding: .75rem 1rem;
    background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2);
    border-radius: 8px; display: flex; align-items: center; justify-content: space-between;
  }
  .o2-duracao-label { font-size: .85rem; color: var(--text-m); font-weight: 500; }
  .o2-duracao-value { font-size: 1rem; font-weight: 700; color: var(--amber); }

  /* ── BOTÕES AÇÃO ── */
  .btn-area { display: flex; gap: .75rem; margin-top: 1.5rem; }
  .btn-finalizar {
    flex: 1; background: var(--green); color: #0f1e35;
    border: none; border-radius: var(--radius); padding: 1rem;
    font-family: var(--ff); font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: background .2s;
  }
  .btn-finalizar:hover { background: var(--green2); color: white; }
  .btn-finalizar:disabled { opacity: .6; cursor: not-allowed; }
  .btn-pdf {
    background: var(--navy2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem 1.25rem;
    font-family: var(--ff); font-size: .95rem; font-weight: 700;
    color: var(--text); cursor: pointer; transition: all .2s;
    display: none; align-items: center; gap: .5rem; white-space: nowrap;
  }
  .btn-pdf:hover { border-color: var(--green); color: var(--green); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--navy2); border: 1px solid var(--border);
    border-radius: 8px; padding: .75rem 1.5rem;
    font-size: .9rem; font-weight: 500;
    opacity: 0; pointer-events: none; transition: opacity .3s;
    z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.erro { border-color: rgba(239,68,68,.4); color: #fca5a5; background: rgba(239,68,68,.1); }

  /* ── LOADING ── */
  .loading {
    position: fixed; inset: 0; background: rgba(9,14,26,.85);
    display: flex; align-items: center; justify-content: center; z-index: 200;
  }
  .loading-spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,.1);
    border-top-color: var(--green);
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── AUTOCOMPLETE ── */
  .autocomplete-wrap { position: relative; }
  .autocomplete-dropdown {
    display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
    background: var(--navy2); border: 1px solid var(--border); border-radius: 8px;
    margin-top: 2px; max-height: 220px; overflow-y: auto;
  }
  .autocomplete-item {
    padding: .55rem .9rem; font-size: .88rem; color: var(--text);
    cursor: pointer; transition: background .15s; border-bottom: 1px solid var(--border);
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover { background: rgba(255,255,255,.07); color: var(--green); }
  .btn-add-airport {
    margin-top: .4rem; font-size: .78rem; font-weight: 600;
    color: var(--amber); background: rgba(245,158,11,.08);
    border: 1px dashed rgba(245,158,11,.35); border-radius: 6px;
    padding: .35rem .75rem; cursor: pointer; font-family: var(--ff);
    transition: all .2s; width: 100%;
  }
  .btn-add-airport:hover { background: rgba(245,158,11,.15); }

  /* ── TEMPO RESULTADO ── */
  .tempo-resultado {
    display: none; margin-top: .5rem;
    background: rgba(120,190,32,.1); border: 1px solid rgba(120,190,32,.25);
    border-radius: 8px; padding: .6rem 1rem; font-size: .87rem; color: var(--green);
  }
  .tempo-resultado small { display: block; margin-top: .2rem; opacity: .8; font-size: .78rem; }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-spinner"></div>
</div>

<div id="app" style="display:none;">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">
        <img src="assets/logo-altusmed.png" style="width:22px;height:22px;object-fit:contain;" alt="AltusMed">
      </div>
      ALTUSMED
    </div>
    <span class="topbar-title">Nova Regulação Aeromédica</span>
    <div class="topbar-right">
      <span class="topbar-user"><span id="topbar-saudacao"></span><strong id="topbar-nome">...</strong></span>
      <a href="restrito.html" class="btn-sm">← Voltar</a>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- SEÇÃO 1: LOGÍSTICA -->
    <div class="section">
      <div class="section-header" onclick="toggleSection('logistica')">
        <span class="section-title">✈ Logística</span>
        <span class="section-toggle open" id="toggle-logistica">▼</span>
      </div>
      <div class="section-body" id="body-logistica">
        <div class="form-grid">
          <div class="field">
            <label>Origem *</label>
            <div class="autocomplete-wrap">
              <input type="text" id="origem" placeholder="Cidade/Aeroporto" autocomplete="off"
                     oninput="acInput('origem')" onblur="acBlur('origem')">
              <div class="autocomplete-dropdown" id="ac-origem"></div>
              <button class="btn-add-airport" id="add-origem" style="display:none;"
                      onmousedown="addAirport('origem')">+ Adicionar este aeroporto à lista</button>
            </div>
          </div>
          <div class="field">
            <label>Destino *</label>
            <div class="autocomplete-wrap">
              <input type="text" id="destino" placeholder="Cidade/Aeroporto" autocomplete="off"
                     oninput="acInput('destino')" onblur="acBlur('destino')">
              <div class="autocomplete-dropdown" id="ac-destino"></div>
              <button class="btn-add-airport" id="add-destino" style="display:none;"
                      onmousedown="addAirport('destino')">+ Adicionar este aeroporto à lista</button>
            </div>
          </div>
          <div class="field">
            <label>Hospital de Origem</label>
            <input type="text" id="log-hospital-origem" placeholder="Nome do hospital">
          </div>
          <div class="field">
            <label>Leito de Origem</label>
            <input type="text" id="log-leito-origem" placeholder="Ex: UTI 12">
          </div>
          <div class="field">
            <label>Hospital de Destino</label>
            <input type="text" id="log-hospital-destino" placeholder="Nome do hospital">
          </div>
          <div class="field">
            <label>Leito de Destino</label>
            <input type="text" id="log-leito-destino" placeholder="Ex: CTI 5">
          </div>
          <div class="field">
            <label>Tipo de Aeronave</label>
            <select id="aeronave">
              <option value="UTI Aérea">UTI Aérea</option>
              <option value="Aeromédico Comercial">Aeromédico Comercial</option>
              <option value="Helicóptero">Helicóptero</option>
              <option value="Transporte Terrestre">Transporte Terrestre</option>
            </select>
          </div>
          <div class="field">
            <label>Tempo de Voo</label>
            <div style="display:flex;gap:.5rem;align-items:center;">
              <input type="number" id="log-horas" placeholder="0" min="0" max="24"
                     style="flex:1;" oninput="calcularTempoMissao()">
              <span style="color:var(--text-l);font-size:.9rem;">h</span>
              <input type="number" id="log-min" placeholder="0" min="0" max="59"
                     style="flex:1;" oninput="calcularTempoMissao()">
              <span style="color:var(--text-l);font-size:.9rem;">min</span>
            </div>
          </div>
        </div>
        <div class="tempo-resultado" id="tempo-resultado"></div>
      </div>
    </div>

    <!-- SEÇÃO 2: PACIENTE -->
    <div class="section">
      <div class="section-header" onclick="toggleSection('paciente')">
        <span class="section-title">🧑‍⚕️ Paciente</span>
        <span class="section-toggle open" id="toggle-paciente">▼</span>
      </div>
      <div class="section-body" id="body-paciente">
        <div class="form-grid">
          <div class="field">
            <label>Nome do Paciente *</label>
            <input type="text" id="paciente_nome" placeholder="Nome completo">
          </div>
          <div class="field">
            <label>Idade (anos)</label>
            <input type="number" id="paciente_idade" placeholder="anos" min="0" max="130"
                   oninput="toggleIdadeMeses()">
          </div>
          <div class="field" id="field-meses" style="display:none;">
            <label>Meses</label>
            <input type="number" id="pac-meses" placeholder="0–11" min="0" max="11"
                   oninput="toggleIdadeMeses()">
          </div>
          <div class="field" id="field-dias" style="display:none;">
            <label>Dias</label>
            <input type="number" id="pac-dias" placeholder="0–31" min="0" max="31">
          </div>
          <div class="field">
            <label>Peso (kg)</label>
            <input type="number" id="pac-peso" placeholder="Ex: 70.5" min="0" step="0.1">
          </div>
          <div class="field">
            <label>Sexo</label>
            <select id="paciente_sexo">
              <option value="Masculino">Masculino</option>
              <option value="Feminino">Feminino</option>
              <option value="Não informado">Não informado</option>
            </select>
          </div>
          <div class="field">
            <label>Classificação NACA *</label>
            <select id="naca">
              <option value="">Selecione...</option>
              <option value="NACA I">NACA I — Leve, sem prejuízo</option>
              <option value="NACA II">NACA II — Moderado, sem risco de vida</option>
              <option value="NACA III">NACA III — Severo, sem risco de vida imediato</option>
              <option value="NACA IV">NACA IV — Risco de vida potencial</option>
              <option value="NACA V">NACA V — Risco de vida agudo</option>
              <option value="NACA VI">NACA VI — Parada cardiorrespiratória</option>
              <option value="NACA VII">NACA VII — Óbito</option>
            </select>
          </div>
          <div class="field full">
            <label>Diagnóstico principal</label>
            <textarea id="diagnostico" rows="2" placeholder="CID / diagnóstico..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- SEÇÃO 3: SINAIS VITAIS -->
    <div class="section">
      <div class="section-header" onclick="toggleSection('sinais')">
        <span class="section-title">📊 Sinais Vitais</span>
        <span class="section-toggle open" id="toggle-sinais">▼</span>
      </div>
      <div class="section-body" id="body-sinais">
        <div class="form-grid">
          <div class="field">
            <label>Pressão Arterial (mmHg)</label>
            <div class="pa-group">
              <input type="number" id="pa_sist" placeholder="Sist." min="0" max="300">
              <span class="pa-sep">/</span>
              <input type="number" id="pa_diast" placeholder="Diast." min="0" max="200">
            </div>
          </div>
          <div class="field">
            <label>FC (bpm)</label>
            <input type="number" id="fc" placeholder="bpm" min="0" max="300">
          </div>
          <div class="field">
            <label>FR (rpm)</label>
            <input type="number" id="fr" placeholder="rpm" min="0" max="60">
          </div>
          <div class="field">
            <label>SpO₂ (%)</label>
            <input type="number" id="spo2" placeholder="%" min="0" max="100">
          </div>
          <div class="field">
            <label>Temperatura (°C)</label>
            <input type="number" id="temp" placeholder="°C" min="30" max="43" step="0.1">
          </div>
        </div>

        <!-- GCS -->
        <div style="margin-top:1rem;">
          <label style="font-size:.75rem;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.05em;">Glasgow Coma Scale (GCS)</label>
          <div class="gcs-group" style="margin-top:.5rem;">
            <div class="field">
              <label>Ocular (O)</label>
              <select id="gcs_o" onchange="calcGCS()">
                <option value="4">4 — Espontânea</option>
                <option value="3">3 — À voz</option>
                <option value="2">2 — À dor</option>
                <option value="1">1 — Ausente</option>
              </select>
            </div>
            <div class="field">
              <label>Verbal (V)</label>
              <select id="gcs_v" onchange="calcGCS()">
                <option value="5">5 — Orientado</option>
                <option value="4">4 — Confuso</option>
                <option value="3">3 — Palavras</option>
                <option value="2">2 — Sons</option>
                <option value="1">1 — Ausente</option>
              </select>
            </div>
            <div class="field">
              <label>Motor (M)</label>
              <select id="gcs_m" onchange="calcGCS()">
                <option value="6">6 — Obedece</option>
                <option value="5">5 — Localiza</option>
                <option value="4">4 — Retirada</option>
                <option value="3">3 — Flexão</option>
                <option value="2">2 — Extensão</option>
                <option value="1">1 — Ausente</option>
              </select>
            </div>
          </div>
          <div class="gcs-total">
            <span class="gcs-total-label">Total GCS</span>
            <span class="gcs-total-value" id="gcs-total">15</span>
          </div>
        </div>
      </div>
    </div>

    <!-- SEÇÃO 4: OXIGÊNIO -->
    <div class="section">
      <div class="section-header" onclick="toggleSection('o2')">
        <span class="section-title">🫁 Oxigênio</span>
        <span class="section-toggle open" id="toggle-o2">▼</span>
      </div>
      <div class="section-body" id="body-o2">
        <div class="form-grid">
          <div class="field">
            <label>O₂ em uso?</label>
            <select id="o2_uso" onchange="toggleO2Fields()">
              <option value="Não">Não</option>
              <option value="Sim">Sim</option>
            </select>
          </div>
        </div>
        <div id="o2-fields" style="display:none; margin-top:.85rem;">
          <div class="form-grid">
            <div class="field">
              <label>Flow (L/min)</label>
              <input type="number" id="o2_flow" placeholder="L/min" min="0" max="15" step="0.5" oninput="calcO2()">
            </div>
            <div class="field">
              <label>Tipo de Cilindro</label>
              <select id="o2_cilindro" onchange="calcO2()">
                <option value="C">C (170 L)</option>
                <option value="D">D (415 L)</option>
                <option value="E">E (680 L)</option>
                <option value="H">H (6900 L)</option>
              </select>
            </div>
          </div>
          <div class="o2-duracao">
            <span class="o2-duracao-label">Duração estimada</span>
            <span class="o2-duracao-value" id="o2-duracao">— min</span>
          </div>
        </div>
      </div>
    </div>

    <!-- SEÇÃO 5: CONDUTA E MEDICAMENTOS -->
    <div class="section">
      <div class="section-header" onclick="toggleSection('conduta')">
        <span class="section-title">💊 Conduta e Medicamentos</span>
        <span class="section-toggle open" id="toggle-conduta">▼</span>
      </div>
      <div class="section-body" id="body-conduta">
        <div class="form-grid full">
          <div class="field">
            <label>Conduta</label>
            <textarea id="conduta" rows="3" placeholder="Procedimentos realizados, intervenções..."></textarea>
          </div>
          <div class="field">
            <label>Medicamentos em uso</label>
            <textarea id="medicamentos" rows="3" placeholder="Medicações em curso, doses..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Botões de ação -->
    <div class="btn-area">
      <button class="btn-finalizar" id="btn-finalizar" onclick="finalizarRegulacao()">
        ✓ Finalizar e Criar Missão
      </button>
      <button class="btn-pdf" id="btn-pdf" onclick="exportarPDF()">
        ⬇ Exportar PDF
      </button>
    </div>

    <div style="height:3rem;"></div>
  </div><!-- /main -->
</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>

const AEROPORTOS_BASE = [

  try {

    if (!session) {
      window.location.href = 'restrito.html';
      return;
    }

function saudacaoCargo(tipo) {
  if (tipo === 'medico' || tipo === 'diretor') return 'Dr. ';
  if (tipo === 'enfermeiro') return 'ENF(a). ';

async function carregarPerfil() {

    perfilAtual = data || {};
    document.getElementById('topbar-saudacao').textContent = saudacaoCargo(perfilAtual.cargo_tipo);

    aeroportosCustom = (data || []).map(r => r.nome);
  } catch(e) {}
}

// ── Autocomplete de aeroportos ────────────────────────────────────────
function jaccard(a, b) {
  const tri = s => {
    const t = new Set(), p = '  ' + s.toLowerCase() + '  ';
    for (let i = 0; i < p.length - 2; i++) t.add(p.slice(i, i + 3));
    return t;
  };
  const ta = tri(a), tb = tri(b);
  const inter = [...ta].filter(x => tb.has(x)).length;
  const union = new Set([...ta, ...tb]).size;
  return union === 0 ? 0 : inter / union;
}

function melhorSim(val) {
  const lista = [...AEROPORTOS_BASE, ...aeroportosCustom];
  return lista.reduce((max, item) => Math.max(max, jaccard(val, item)), 0);
}

function acInput(campo) {
  const input    = document.getElementById(campo);
  const val      = input.value.trim();
  const dropdown = document.getElementById('ac-' + campo);
  const btnAdd   = document.getElementById('add-' + campo);

  if (val.length < 2) {
    dropdown.innerHTML = ''; dropdown.style.display = 'none';
    btnAdd.style.display = 'none'; return;
  }

  const lista = [...AEROPORTOS_BASE, ...aeroportosCustom];
  const valLow = val.toLowerCase();
  const matches = lista.filter(a => a.toLowerCase().includes(valLow)).slice(0, 8);

  if (matches.length > 0) {
    dropdown._matches = matches;
    dropdown.innerHTML = matches.map((m, i) =>
      `<div class="autocomplete-item" onmousedown="acSelect('${campo}',${i})">${m}</div>`
    ).join('');
    dropdown.style.display = 'block';
    btnAdd.style.display = 'none';
  } else {
    dropdown.innerHTML = ''; dropdown.style.display = 'none';
    btnAdd.style.display = melhorSim(val) < 0.75 ? 'block' : 'none';
  }
}

function acSelect(campo, idx) {
  const dropdown = document.getElementById('ac-' + campo);
  document.getElementById(campo).value = dropdown._matches[idx];
  dropdown.style.display = 'none';
  document.getElementById('add-' + campo).style.display = 'none';
}

function acBlur(campo) {
  setTimeout(() => {
    document.getElementById('ac-' + campo).style.display = 'none';
  }, 150);
}

async function addAirport(campo) {
  const val = document.getElementById(campo).value.trim();
  if (!val) return;
  try {
    await db.from('aeroportos_custom').insert({ nome: val, criado_por: usuarioAtual.id });
    aeroportosCustom.push(val);
    document.getElementById('add-' + campo).style.display = 'none';
    toast('Aeroporto adicionado à lista!');
  } catch(e) {
    toast('Erro ao salvar aeroporto.', true);
  }
}

// ── Tempo de missão ───────────────────────────────────────────────────
function calcularTempoMissao() {
  const h   = parseInt(document.getElementById('log-horas').value) || 0;
  const m   = parseInt(document.getElementById('log-min').value)   || 0;
  const voo = h * 60 + m;
  const res = document.getElementById('tempo-resultado');
  if (voo === 0) { res.style.display = 'none'; return; }

  let total = voo + 60;
  if (voo > 210) total += 60;

  const hT = Math.floor(total / 60), mT = total % 60;
  res.innerHTML = 'Tempo estimado de missão: <strong>' + hT + 'h ' + mT + 'min</strong>' +
    (voo > 210 ? '<small>Inclui 1h de parada para reabastecimento</small>' : '');
  res.style.display = 'block';
}

// ── Idade pediátrica ──────────────────────────────────────────────────
function toggleIdadeMeses() {
  const anos        = parseInt(document.getElementById('paciente_idade').value);
  const mesesInput  = document.getElementById('pac-meses');
  const fieldMeses  = document.getElementById('field-meses');
  const fieldDias   = document.getElementById('field-dias');

  if (isNaN(anos) || anos > 0) {
    fieldMeses.style.display = 'none'; fieldDias.style.display = 'none';
    mesesInput.value = ''; document.getElementById('pac-dias').value = '';
    return;
  }
  fieldMeses.style.display = 'flex';
  const meses = parseInt(mesesInput.value);
  fieldDias.style.display = (!isNaN(meses) && meses === 0 && mesesInput.value !== '') ? 'flex' : 'none';
}

// ── Seções colapsáveis ────────────────────────────────────────────────
function toggleSection(id) {

  const toggle = document.getElementById('toggle-' + id);
  const hidden = body.classList.toggle('hidden');
  toggle.classList.toggle('open', !hidden);
}

// ── GCS ───────────────────────────────────────────────────────────────
function calcGCS() {
  const o = parseInt(document.getElementById('gcs_o').value) || 0;
  const v = parseInt(document.getElementById('gcs_v').value) || 0;
  const m = parseInt(document.getElementById('gcs_m').value) || 0;
  document.getElementById('gcs-total').textContent = o + v + m;
}

// ── O2 ────────────────────────────────────────────────────────────────
const O2_CAP = { C: 170, D: 415, E: 680, H: 6900 };

function toggleO2Fields() {
  const sim = document.getElementById('o2_uso').value === 'Sim';
  document.getElementById('o2-fields').style.display = sim ? 'block' : 'none';
  if (sim) calcO2();
}

function calcO2() {
  const flow = parseFloat(document.getElementById('o2_flow').value) || 0;
  const tipo = document.getElementById('o2_cilindro').value;
  const cap  = O2_CAP[tipo] || 0;
  const el   = document.getElementById('o2-duracao');
  if (!flow || flow <= 0) { el.textContent = '— min'; return; }
  const mins = Math.floor(cap / flow);
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  el.textContent = h > 0 ? `${h}h ${m}min` : `${m} min`;
}

// ── Toast ─────────────────────────────────────────────────────────────
function toast(msg, erro = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (erro ? ' erro' : '');
  setTimeout(() => t.className = 'toast', 3500);
}

// ── Finalizar ─────────────────────────────────────────────────────────
async function finalizarRegulacao() {
  const origem       = document.getElementById('origem').value.trim();
  const destino      = document.getElementById('destino').value.trim();
  const paciente_nome = document.getElementById('paciente_nome').value.trim();
  const naca         = document.getElementById('naca').value;

  if (!origem || !destino) {
    toast('Informe origem e destino.', true); return;
  }
  if (!paciente_nome) {
    toast('Informe o nome do paciente.', true); return;
  }
  if (!naca) {
    toast('Selecione a classificação NACA.', true); return;
  }

  const btn = document.getElementById('btn-finalizar');
  btn.disabled = true; btn.textContent = 'Salvando...';

  const codigo = 'AM-' + String(Date.now()).slice(-6);

  const gcsTotal   = parseInt(document.getElementById('gcs-total').textContent) || null;
  const o2Ativo    = document.getElementById('o2_uso').value === 'Sim';
  const o2Flow     = o2Ativo ? parseFloat(document.getElementById('o2_flow').value) || null : null;
  const o2Cilindro = o2Ativo ? document.getElementById('o2_cilindro').value : null;
  const o2Duracao  = (o2Ativo && o2Flow && o2Cilindro)
    ? Math.floor((O2_CAP[o2Cilindro] || 0) / o2Flow) : null;

  const paSist  = document.getElementById('pa_sist').value;
  const paDiast = document.getElementById('pa_diast').value;
  const pa = (paSist && paDiast) ? `${paSist}/${paDiast}` : null;

  const hVoo    = parseInt(document.getElementById('log-horas').value) || 0;
  const mVoo    = parseInt(document.getElementById('log-min').value)   || 0;
  const vooMin  = hVoo * 60 + mVoo;
  let   totalMin = vooMin + 60;
  if (vooMin > 210) totalMin += 60;

  const regulacaoData = {
    codigo,
    medico_id:            usuarioAtual.id,
    origem,
    destino,
    hospital_origem:      document.getElementById('log-hospital-origem').value.trim() || 'Ignorado',
    leito_origem:         document.getElementById('log-leito-origem').value.trim()    || 'Ignorado',
    hospital_destino:     document.getElementById('log-hospital-destino').value.trim() || 'Ignorado',
    leito_destino:        document.getElementById('log-leito-destino').value.trim()   || 'Ignorado',
    aeronave:             document.getElementById('aeronave').value,
    tempo_voo_horas:      hVoo,
    tempo_voo_minutos:    mVoo,
    tempo_total_missao:   vooMin > 0 ? totalMin : null,
    paciente_nome,
    paciente_idade:       parseInt(document.getElementById('paciente_idade').value) || null,
    paciente_idade_meses: parseInt(document.getElementById('pac-meses').value) || null,
    paciente_idade_dias:  parseInt(document.getElementById('pac-dias').value)  || null,
    paciente_peso:        parseFloat(document.getElementById('pac-peso').value) || null,
    paciente_sexo:        document.getElementById('paciente_sexo').value,
    diagnostico:      document.getElementById('diagnostico').value.trim(),
    naca,
    pa,
    fc:               parseInt(document.getElementById('fc').value) || null,
    fr:               parseInt(document.getElementById('fr').value) || null,
    spo2:             parseInt(document.getElementById('spo2').value) || null,
    temp:             parseFloat(document.getElementById('temp').value) || null,
    gcs_o:            parseInt(document.getElementById('gcs_o').value) || null,
    gcs_v:            parseInt(document.getElementById('gcs_v').value) || null,
    gcs_m:            parseInt(document.getElementById('gcs_m').value) || null,
    gcs_total:        gcsTotal,
    o2_ativo:         o2Ativo,
    o2_flow:          o2Flow,
    o2_cilindro:      o2Cilindro,
    o2_duracao:       o2Duracao,
    conduta:          document.getElementById('conduta').value.trim(),
    medicamentos:     document.getElementById('medicamentos').value.trim(),
    status:           'Em andamento',
    created_at:       new Date().toISOString(),
  };

  try {
    // Salva na tabela regulacoes
    const { data: reg, error: regErr } = await db.from('regulacoes')
      .insert(regulacaoData).select('id').single();
    if (regErr) throw regErr;

    // Cria missão
    const { data: missao, error: missErr } = await db.from('missoes').insert({
      codigo,
      medico_id:      usuarioAtual.id,
      paciente_nome,
      paciente_idade: regulacaoData.paciente_idade,
      origem,
      destino,
      tipo:           regulacaoData.aeronave,
      equipe:         perfilAtual.nome || '',
      status:         'Em andamento',
      naca,
      diagnostico:    regulacaoData.diagnostico,
      hora_pouso:     null,
      hora_transferencia: null,
      desfecho:       null,
    }).select('id').single();
    if (missErr) throw missErr;

    // Atualiza regulacao com missao_id
    if (reg?.id && missao?.id) {
      await db.from('regulacoes').update({ missao_id: missao.id }).eq('id', reg.id);
    }

    regulacaoSalva = regulacaoData;
    toast('✓ Regulação e missão criadas com sucesso!');
    btn.textContent = '✓ Salvo — volte ao painel ou exporte o PDF';
    document.getElementById('btn-pdf').style.display = 'inline-flex';
  } catch(e) {
    toast('Erro ao salvar: ' + (e.message || 'verifique os dados e tente novamente.'), true);
    btn.disabled = false; btn.textContent = '✓ Finalizar e Criar Missão';
  }
}

// ── Exportar PDF ──────────────────────────────────────────────────────
function exportarPDF() {
  if (!regulacaoSalva) { toast('Salve a regulação antes de exportar.', true); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const d  = regulacaoSalva;
  const ml = 20, pw = 210, cw = pw - ml * 2;
  let y    = 20;
  const now = new Date().toLocaleString('pt-BR');

  function checkPage() {
    if (y > 270) { doc.addPage(); y = 20; }
  }

  function secHeader(title) {
    checkPage();
    y += 3;
    doc.setFillColor(26, 46, 74);
    doc.rect(ml, y, cw, 7, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8.5);
    doc.setTextColor(255, 255, 255);
    doc.text(title, ml + 3, y + 5);
    y += 10;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(25, 25, 25);
  }

  function row(label, value) {
    if (value === null || value === undefined || value === '') return;
    checkPage();
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(90, 90, 90);
    doc.text(label, ml, y);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(20, 20, 20);
    doc.text(String(value), ml + 52, y);
    y += 6;
  }

  function multiRow(label, text) {
    if (!text) return;
    checkPage();
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(90, 90, 90);
    doc.text(label, ml, y);
    y += 5;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(20, 20, 20);
    doc.splitTextToSize(text, cw - 4).forEach(l => {
      checkPage();
      doc.text(l, ml + 2, y); y += 5;
    });
    y += 2;
  }

  // Cabeçalho
  doc.setFillColor(15, 30, 53);
  doc.rect(0, 0, pw, 28, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(20);
  doc.setTextColor(120, 190, 32);
  doc.text('ALTUSMED', ml, 13);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(180, 200, 220);
  doc.text('Regulacao Aeromédica', ml, 21);
  doc.setFontSize(8);
  doc.setTextColor(120, 140, 160);
  doc.text('Gerado em: ' + now, pw - ml, 21, { align: 'right' });

  y = 36;

  // Código da missão
  doc.setFillColor(235, 243, 255);
  doc.setDrawColor(26, 46, 74);
  doc.roundedRect(ml, y, cw, 10, 2, 2, 'FD');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.setTextColor(26, 46, 74);
  doc.text('Missão: ' + d.codigo, pw / 2, y + 7, { align: 'center' });
  y += 16;

  // Logística
  secHeader('LOGISTICA');
  row('Origem', d.origem);
  if (d.hospital_origem && d.hospital_origem !== 'Ignorado') row('Hospital Origem', d.hospital_origem);
  if (d.leito_origem    && d.leito_origem    !== 'Ignorado') row('Leito Origem',    d.leito_origem);
  row('Destino', d.destino);
  if (d.hospital_destino && d.hospital_destino !== 'Ignorado') row('Hospital Destino', d.hospital_destino);
  if (d.leito_destino    && d.leito_destino    !== 'Ignorado') row('Leito Destino',    d.leito_destino);
  row('Aeronave', d.aeronave);
  if (d.tempo_voo_horas || d.tempo_voo_minutos) {
    row('Tempo de voo', (d.tempo_voo_horas || 0) + 'h ' + (d.tempo_voo_minutos || 0) + 'min');
  }
  if (d.tempo_total_missao) {
    const ht = Math.floor(d.tempo_total_missao / 60), mt = d.tempo_total_missao % 60;
    const nota = d.tempo_voo_horas * 60 + d.tempo_voo_minutos > 210 ? ' (incl. reabastecimento)' : '';
    row('Tempo total missão', ht + 'h ' + mt + 'min' + nota);
  }

  // Paciente
  secHeader('PACIENTE');
  row('Nome', d.paciente_nome);
  (() => {
    if (!d.paciente_idade && d.paciente_idade !== 0) return;
    let idadeStr = d.paciente_idade + ' anos';
    if (d.paciente_idade === 0 && d.paciente_idade_meses != null) {
      idadeStr = d.paciente_idade_meses + ' meses';
      if (d.paciente_idade_meses === 0 && d.paciente_idade_dias != null)
        idadeStr = d.paciente_idade_dias + ' dias';
    }
    row('Idade', idadeStr);
  })();
  if (d.paciente_peso) row('Peso', d.paciente_peso + ' kg');
  row('Sexo', d.paciente_sexo);
  row('NACA', d.naca);
  multiRow('Diagnóstico', d.diagnostico);

  // Sinais Vitais
  secHeader('SINAIS VITAIS');
  row('PA (mmHg)', d.pa);
  row('FC', d.fc ? d.fc + ' bpm' : null);
  row('FR', d.fr ? d.fr + ' rpm' : null);
  row('SpO2', d.spo2 ? d.spo2 + ' %' : null);
  row('Temperatura', d.temp ? d.temp + ' °C' : null);
  if (d.gcs_total) {
    row('GCS Total', d.gcs_total + ' / 15');
    row('GCS  O / V / M', d.gcs_o + ' / ' + d.gcs_v + ' / ' + d.gcs_m);
  }

  // O2
  if (d.o2_ativo) {
    secHeader('OXIGENIO');
    row('Flow', d.o2_flow ? d.o2_flow + ' L/min' : null);
    row('Cilindro', d.o2_cilindro);
    if (d.o2_duracao) {
      const h = Math.floor(d.o2_duracao / 60), m = d.o2_duracao % 60;
      row('Duração estimada', h > 0 ? h + 'h ' + m + 'min' : m + ' min');
    }
  }

  // Conduta
  if (d.conduta || d.medicamentos) {
    secHeader('CONDUTA E MEDICAMENTOS');
    multiRow('Conduta', d.conduta);
    multiRow('Medicamentos', d.medicamentos);
  }

  // Rodapé
  const footY = Math.max(y + 15, 262);
  doc.setDrawColor(180, 180, 180);
  doc.line(ml, footY, pw - ml, footY);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(60, 60, 60);
  const medicoNome = perfilAtual.nome || usuarioAtual?.email || '';
  const crm = perfilAtual.crm ? '  |  CRM-PA ' + perfilAtual.crm : '';
  doc.text('Médico Regulador: ' + medicoNome + crm, ml, footY + 5);
  doc.setDrawColor(100, 100, 100);
  doc.line(ml, footY + 14, ml + 72, footY + 14);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7.5);
  doc.setTextColor(100, 100, 100);
  doc.text('Assinatura do Médico Regulador', ml, footY + 18);

  doc.save('AltusMed-' + d.codigo + '.pdf');
}
